; ============================================================
;  Air Mouse – PlatformIO Configuration
;  ESP32 + MPU6500 + Bluetooth HID
; ============================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor baud rate
monitor_speed = 115200

; Required library:
;   T-vK/ESP32-BLE-Mouse  – Bluetooth LE HID mouse for ESP32
;   (depends on the BLE stack already bundled with espressif32)
lib_deps =
    https://github.com/T-vK/ESP32-BLE-Mouse.git

; Increase partition size if you hit "region `iram0_0_seg' overflowed" errors.
; The BLE stack is large; the no_ota partition scheme gives more app space.
board_build.partitions = min_spiffs.csv

; Optional: raise BLE stack size if you see stack-overflow panics
build_flags =
    -DCONFIG_BT_NIMBLE_ENABLED=0
